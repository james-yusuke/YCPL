name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ycpl-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Build and test
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js 24
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            binutils \
            clang \
            cmake \
            curl \
            gnupg \
            libcurl4-openssl-dev \
            libedit-dev \
            libffi-dev \
            libxml2-dev \
            libzstd-dev \
            lld \
            python3 \
            wget \
            xvfb \
            zlib1g-dev

      - name: Install LLVM 22
        run: scripts/setup-llvm.sh 22

      - name: Export LLVM 22 environment
        run: |
          eval "$(scripts/setup-llvm.sh 22 --print-env)"
          CLANG_WRAPPER="$RUNNER_TEMP/ycpl-clang"
          {
            echo '#!/usr/bin/env bash'
            # clang -std=c11 on glibc hides readlink(2) unless a POSIX feature
            # level is selected. The self-host driver also uses this wrapper
            # when it compiles the external YCPL runtime.
            printf 'exec %q -D_POSIX_C_SOURCE=200809L -no-pie -fuse-ld=lld "$@"\n' "$LLVM_BINDIR/clang"
          } > "$CLANG_WRAPPER"
          chmod +x "$CLANG_WRAPPER"
          "$CLANG_WRAPPER" --version
          LLVM_ENV="$RUNNER_TEMP/ycpl-llvm-env.sh"
          {
            echo '#!/usr/bin/env bash'
            printf 'export LLVM_CONFIG=%q\n' "$LLVM_CONFIG"
            printf 'export LLVM_BINDIR=%q\n' "$LLVM_BINDIR"
            printf 'export LLVM_DIR=%q\n' "$LLVM_DIR"
            printf 'export LLC=%q\n' "$LLVM_BINDIR/llc"
            printf 'export CLANG=%q\n' "$CLANG_WRAPPER"
            printf 'export LINKFLAGS=%q\n' '-no-pie -fuse-ld=lld'
            printf 'export PATH=%q\n' "$LLVM_BINDIR:$PATH"
          } > "$LLVM_ENV"
          chmod +x "$LLVM_ENV"
          {
            echo "LLVM_CONFIG=$LLVM_CONFIG"
            echo "LLVM_BINDIR=$LLVM_BINDIR"
            echo "LLVM_DIR=$LLVM_DIR"
            echo "LLC=$LLVM_BINDIR/llc"
            echo "CLANG=$CLANG_WRAPPER"
            echo "LINKFLAGS=-no-pie -fuse-ld=lld"
            echo "YCPL_LLVM_ENV=$LLVM_ENV"
          } >> "$GITHUB_ENV"
          echo "$LLVM_BINDIR" >> "$GITHUB_PATH"

      - name: Summarize pull request changes
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "## Pull request changes"
            echo
            echo '```text'
            git diff --name-status "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
            echo '```'
            echo
            echo "## Diff stat"
            echo
            echo '```text'
            git diff --stat "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Configure C++ seed compiler
        run: cmake -S . -B build -DLLVM_DIR="$LLVM_DIR"

      - name: Build C++ seed compiler
        run: cmake --build build

      - name: Set up Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Mount Bazel cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/bazel
          key: bazel-${{ runner.os }}-${{ hashFiles('MODULE.bazel', 'MODULE.bazel.lock', 'BUILD.bazel', 'compiler/ycpl/**', 'stl/c/**', 'tools/bazel/**') }}
          restore-keys: |
            bazel-${{ runner.os }}-

      - name: Build bootstrap and self-host stages
        run: |
          source "$RUNNER_TEMP/ycpl-llvm-env.sh"
          test -n "$CLANG"
          test -x "$CLANG"
          bazel build \
            --action_env=PATH="$PATH" \
            --action_env=LLVM_CONFIG="$LLVM_CONFIG" \
            --action_env=LLVM_BINDIR="$LLVM_BINDIR" \
            --action_env=LLC="$LLC" \
            --action_env=CLANG="$CLANG" \
            --action_env=LINKFLAGS="$LINKFLAGS" \
            --host_action_env=PATH="$PATH" \
            --host_action_env=LLVM_CONFIG="$LLVM_CONFIG" \
            --host_action_env=LLVM_BINDIR="$LLVM_BINDIR" \
            --host_action_env=LLC="$LLC" \
            --host_action_env=CLANG="$CLANG" \
            --host_action_env=LINKFLAGS="$LINKFLAGS" \
            --linkopt=-fuse-ld=lld \
            --host_linkopt=-fuse-ld=lld \
            //:ycc-bootstrap \
            //:ycc-stage1 \
            //:ycc-stage2 \
            //:ycc-stage3 \
            //:ycc \
            //:ycc-ycpl

      - name: Verify promoted compiler
        run: |
          set -euo pipefail
          source "$RUNNER_TEMP/ycpl-llvm-env.sh"
          cmp bazel-bin/ycc bazel-bin/ycc-ycpl
          bazel-bin/ycc check compiler/ycpl
          YCPL_STL_ROOT="$PWD/stl" \
          YCPL_RUNTIME_SRC="$PWD/bootstrap/cpp/runtime/yc_runtime.c" \
            bazel-bin/ycc build examples/basics/hello.yc -o /tmp/ycpl-ci-hello
          test "$(/tmp/ycpl-ci-hello/merged)" = "Hello World"
          if strings bazel-bin/ycc | grep -E 'YCPL_BOOTSTRAP_YCC|YCPL_NO_BOOTSTRAP|YCPL_SELFHOST_STRICT|--bootstrap|compiler-smoke'; then
            echo "Promoted ycc contains a bootstrap/fallback route" >&2
            exit 1
          fi

      - name: Test with Bazel
        run: |
          source "$RUNNER_TEMP/ycpl-llvm-env.sh"
          export YCPL_STL_ROOT="$PWD/stl"
          export YCPL_RUNTIME_SRC="$PWD/bootstrap/cpp/runtime/yc_runtime.c"
          test -n "$CLANG"
          test -x "$CLANG"
          test -d "$YCPL_STL_ROOT"
          test -f "$YCPL_RUNTIME_SRC"
          bazel test \
            --action_env=PATH="$PATH" \
            --action_env=LLVM_CONFIG="$LLVM_CONFIG" \
            --action_env=LLVM_BINDIR="$LLVM_BINDIR" \
            --action_env=LLC="$LLC" \
            --action_env=CLANG="$CLANG" \
            --action_env=LINKFLAGS="$LINKFLAGS" \
            --host_action_env=PATH="$PATH" \
            --host_action_env=LLVM_CONFIG="$LLVM_CONFIG" \
            --host_action_env=LLVM_BINDIR="$LLVM_BINDIR" \
            --host_action_env=LLC="$LLC" \
            --host_action_env=CLANG="$CLANG" \
            --host_action_env=LINKFLAGS="$LINKFLAGS" \
            --test_env=LLVM_CONFIG="$LLVM_CONFIG" \
            --test_env=LLVM_BINDIR="$LLVM_BINDIR" \
            --test_env=LLC="$LLC" \
            --test_env=CLANG="$CLANG" \
            --test_env=LINKFLAGS="$LINKFLAGS" \
            --test_env=YCPL_STL_ROOT="$YCPL_STL_ROOT" \
            --test_env=YCPL_RUNTIME_SRC="$YCPL_RUNTIME_SRC" \
            --linkopt=-fuse-ld=lld \
            --host_linkopt=-fuse-ld=lld \
            --test_timeout=1800 \
            --test_output=errors \
            //...

      - name: Run C++ bootstrap regression
        run: |
          source "$RUNNER_TEMP/ycpl-llvm-env.sh"
          tests/run_bootstrap_regression.sh

      - name: Install VSCode extension dependencies
        run: |
          npm ci --prefix editors/vscode/extension
          npm ci --prefix editors/vscode/language-server

      - name: Check VSCode extension
        run: |
          npm run check --prefix editors/vscode/extension
          npm run check --prefix editors/vscode/language-server

      - name: Test VSCode Extension Host
        run: xvfb-run -a npm run test:extension --prefix editors/vscode/extension

      - name: Run LSP protocol tests
        run: |
          source "$RUNNER_TEMP/ycpl-llvm-env.sh"
          tools/lsp/run_tests.sh

      - name: Test native LSP in VSCode Extension Host
        run: xvfb-run -a npm run test:extension:native --prefix editors/vscode/extension

      - name: Package VSCode extension
        run: |
          npm run package --prefix editors/vscode/extension
          npm run check-package --prefix editors/vscode/extension

      - name: Upload VSCode extension
        uses: actions/upload-artifact@v7
        with:
          name: ycpl-vscode
          path: editors/vscode/extension/artifacts/ycpl-vscode.vsix
          archive: false
          if-no-files-found: error

      - name: Summarize verification
        if: always()
        run: |
          {
            echo "## Verification"
            echo
            echo "| Check | Command |"
            echo "|---|---|"
            echo "| C++ seed | \`cmake --build build\` |"
            echo "| Self-host chain | \`bazel build //:ycc-bootstrap //:ycc-stage1 //:ycc-stage2 //:ycc-stage3 //:ycc //:ycc-ycpl\` |"
            echo "| Fixed point and conformance | \`bazel test --test_timeout=1800 //...\` |"
            echo "| C++ regression | \`tests/run_bootstrap_regression.sh\` |"
            echo "| VSCode extension | \`npm run check && npm run test:extension && npm run test:extension:native\` |"
            echo "| VSIX package | \`npm run package && npm run check-package\` |"
            echo "| Native and TypeScript LSP protocol | \`tools/lsp/run_tests.sh\` |"
          } >> "$GITHUB_STEP_SUMMARY"
