name: Bug report
description: Report a reproducible YCPL bug.
title: "bug: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. For security-sensitive reports, please do not open a public issue; follow SECURITY.md instead.
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of YCPL is affected?
      options:
        - Bootstrap C++ compiler
        - YCPL compiler
        - Runtime or standard library
        - Build, CI, or packaging
        - VS Code extension or language server
        - Documentation
        - Not sure
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
      placeholder: Describe the failure, crash, incorrect output, or confusing behavior.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Provide the smallest steps or `.yc` sample that reproduces the issue.
      placeholder: |
        1. Run ...
        2. Build ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include relevant logs, diagnostics, or output.
      render: text
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or branch
      description: Which commit, tag, or branch did you test?
      placeholder: main at abc1234
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, architecture, compiler, LLVM version, Bazel version, CMake version, and Node/npm versions if relevant.
      placeholder: |
        OS:
        Architecture:
        LLVM:
        Bazel:
        CMake:
        Node/npm:
  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: Which checks did you run?
      placeholder: |
        bazel build //...
        bazel test //...
        cmake --build /tmp/ycpl-cmake-check
        npm run check --prefix editors/vscode/extension
