version: 2
updates:
  - package-ecosystem: "bazel"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/editors/vscode/extension"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/editors/vscode/language-server"
    schedule:
      interval: "weekly"
